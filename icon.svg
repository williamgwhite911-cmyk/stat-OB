<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="adultGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#15803d"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="obGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#be185d"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="pedsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="div1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset=".5" stop-color="#22c55e" stop-opacity=".4"/>
      <stop offset="1" stop-color="#be185d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="div2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0"/>
      <stop offset=".5" stop-color="#f472b6" stop-opacity=".4"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Black rounded square -->
  <rect width="512" height="512" rx="96" fill="#000000"/>

  <!-- ADULT — top, green gradient -->
  <text x="256" y="170"
        font-family="Lato, Helvetica Neue, Arial Black, sans-serif"
        font-size="100" font-weight="900"
        fill="url(#adultGrad)" text-anchor="middle"
        letter-spacing="-3">ADULT</text>

  <!-- divider 1 -->
  <line x1="120" y1="200" x2="392" y2="200"
        stroke="url(#div1)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- OB — middle, rose/pink -->
  <text x="256" y="305"
        font-family="Lato, Helvetica Neue, Arial Black, sans-serif"
        font-size="130" font-weight="900"
        fill="url(#obGrad)" text-anchor="middle"
        letter-spacing="-4">OB</text>

  <!-- divider 2 -->
  <line x1="120" y1="335" x2="392" y2="335"
        stroke="url(#div2)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- PEDS — bottom, teal/cyan -->
  <text x="256" y="448"
        font-family="Lato, Helvetica Neue, Arial Black, sans-serif"
        font-size="105" font-weight="900"
        fill="url(#pedsGrad)" text-anchor="middle"
        letter-spacing="-2">PEDS</text>

  <!-- "SF" watermark, bottom-left corner -->
  <text x="32" y="495"
        font-family="Lato, Helvetica Neue, Arial, sans-serif"
        font-size="22" font-weight="800"
        fill="#ffffff" opacity=".25"
        letter-spacing="2">SF</text>
</svg>
