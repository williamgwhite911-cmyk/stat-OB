<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="obGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#be185d"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="pedsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#be185d" stop-opacity=".0"/>
      <stop offset=".4" stop-color="#f472b6" stop-opacity=".55"/>
      <stop offset=".6" stop-color="#22d3ee" stop-opacity=".55"/>
      <stop offset="1" stop-color="#0e7490" stop-opacity=".0"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="512" height="512" rx="96" fill="#000000"/>

  <!-- "OB" — top half, rose/pink gradient -->
  <text x="256" y="220"
        font-family="Helvetica Neue, Arial Black, sans-serif"
        font-size="180" font-weight="900"
        fill="url(#obGrad)" text-anchor="middle"
        letter-spacing="-4">OB</text>

  <!-- Center divider — soft gradient line -->
  <line x1="100" y1="256" x2="412" y2="256"
        stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- "PEDS" — bottom half, teal/cyan gradient -->
  <text x="256" y="390"
        font-family="Helvetica Neue, Arial Black, sans-serif"
        font-size="130" font-weight="900"
        fill="url(#pedsGrad)" text-anchor="middle"
        letter-spacing="-2">PEDS</text>

  <!-- Tiny subtle "SF" mark in corner (optional brand) -->
  <text x="58" y="468"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="22" font-weight="800"
        fill="#ffffff" opacity=".25"
        letter-spacing="2">SF</text>
</svg>
